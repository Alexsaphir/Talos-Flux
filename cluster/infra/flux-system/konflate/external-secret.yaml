---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: konflate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden

  target:
    name: konflate-secret
    template:
      data:
        KONFLATE_WEBHOOK_SECRET: '{{ .KONFLATE_WEBHOOK_SECRET }}'
        KONFLATE_WRITE_TOKEN: '{{ .KONFLATE_WRITE_TOKEN }}'

  dataFrom:
    - extract:
        key: konflate
