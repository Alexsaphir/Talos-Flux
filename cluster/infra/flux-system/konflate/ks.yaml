---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app konflate
  namespace: &namespace flux-system
spec:
  components:
    - ../../../components/volsync
    - ../../../components/kopiur

  postBuild:
    substitute:
      APP: *app
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_CACHE_CAPACITY: 5Gi

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/infra/flux-system/konflate
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
