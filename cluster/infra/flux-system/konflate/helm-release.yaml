---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: konflate
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.2.34
  url: oci://ghcr.io/home-operations/charts/konflate
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: konflate

  values:
    config:
      repo: gitlab://gitlab.alexsaphir.com/Homelab/Talos-Flux
      statusChecks: true
      prComments: true
      publicUrl: https://{{ .Release.Name }}.${DOMAIN_NAME}
      mcp: true
      verifyImages: true

    secret:
      existingSecret: '{{ .Release.Name }}-secret'

    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          conditions: ["[STATUS] == 200"]
      parentRefs:
        - name: envoy
          namespace: envoy-system
      hostnames: [ '{{ .Release.Name }}.${DOMAIN_NAME}' ]

    monitoring:
      serviceMonitor:
        enabled: true

    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi

    persistence:
      enabled: true
      existingClaim: '{{ .Release.Name }}'
