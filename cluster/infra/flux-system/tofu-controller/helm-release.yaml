---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: tofu-controller
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.16.0-rc.7
  url: oci://ghcr.io/flux-iac/charts/tofu-controller
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: tofu-controller

  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace

  values:
    runner:
      image:
        repository: ghcr.io/home-operations/opentofu-runner
        tag: 1.12.2@sha256:a7fe29d33698981d502eed37a3580e72b57b57a75e7b6d5c687f28d17db0dad6

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        interval: 1m
