---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: old-postgres
  annotations:
    kyverno.io/ignore: "true"

spec:
  imageName: ghcr.io/tensorchord/cloudnative-pgvecto.rs:16.3-v0.2.1

  instances: 2

  enableSuperuserAccess: true

  resources:
    requests:
      memory: "2Gi"

  storage:
    size: 10Gi
    storageClass: openebs-hostpath


  postgresql:
    parameters:
      max_connections: "800"
      max_slot_wal_keep_size: 10GB
      shared_buffers: "512MB"
    shared_preload_libraries:
      - "vectors.so"

  bootstrap:
    recovery:
      source: &previousCluster postgres-16-v6

  backup:
    retentionPolicy: 30d
    barmanObjectStore:
      serverName: postgres-16-v7
      wal:
        compression: &compression bzip2
        maxParallel: &maxParallel 4

      data:
        compression: *compression

      destinationPath: &destinationPath 's3://backup-cloudnative/'
      endpointURL: &endpoint 'http://nas.minio-system.svc.cluster.local:9000'
      s3Credentials:
        accessKeyId:
          name: &s3Credentials-secret postgres-backup-secret
          key: &s3Credentials-accessKeyId-key ACCESS_KEY_ID
        secretAccessKey:
          name: *s3Credentials-secret
          key: &s3Credentials-secretAccessKey-key ACCESS_SECRET_KEY

  externalClusters:
    - name: *previousCluster
      barmanObjectStore:
        serverName: *previousCluster
        wal:
          compression: *compression
          maxParallel: *maxParallel
        data:
          compression: *compression

        destinationPath: *destinationPath
        endpointURL: *endpoint
        s3Credentials:
          accessKeyId:
            name: *s3Credentials-secret
            key: *s3Credentials-accessKeyId-key
          secretAccessKey:
            name: *s3Credentials-secret
            key: *s3Credentials-secretAccessKey-key

  managed:
    services:
      disabledDefaultServices: [ 'ro', 'r' ]
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: old-postgres-lb
              annotations:
                external-dns.alpha.kubernetes.io/hostname: old-postgres.svc.talos.${DOMAIN_NAME}

            spec:
              type: LoadBalancer
              ipFamilyPolicy: PreferDualStack
              externalTrafficPolicy: Local
