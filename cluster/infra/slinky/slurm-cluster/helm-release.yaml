---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: slurm-cluster
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 1.1.0
  url: oci://ghcr.io/slinkyproject/charts/slurm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: slurm-cluster
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: slurm-cluster

  values:
    clusterName: 'talos-slurm'

    controller:
      persistence:
        storageClassName: ceph-block

      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
