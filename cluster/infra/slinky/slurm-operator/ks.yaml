---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app slurm-operator
  namespace: &namespace slinky
spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  dependsOn:
    - name: cert-manager
      namespace: cert-manager

  prune: true
  interval: 1h
  path: cluster/infra/slinky/slurm-operator
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
