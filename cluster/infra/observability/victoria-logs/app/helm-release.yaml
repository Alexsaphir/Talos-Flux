---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-logs
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.13.7
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-logs-single
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app victoria-logs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: victoria-logs

  values:
    nameOverride: *app

    global:
      image:
        registry: quay.io

    dashboards:
      enabled: true
      grafanaOperator:
        enabled: true
        spec:
          instanceSelector:
            matchLabels:
              dashboards: null
              grafana.internal/instance: grafana


    server:
      fullnameOverride: *app
      retentionPeriod: 90d

      persistentVolume:
        enabled: true
        storageClassName: ceph-block
        size: 50Gi

      route:
        enabled: true
        annotations:
          gatus.home-operations.com/endpoint: |-
            group: observability
        hostnames: [ 'logs.${DOMAIN_NAME}' ]
        parentRefs:
          - name: envoy
            namespace: envoy-system

      serviceMonitor:
        enabled: true
