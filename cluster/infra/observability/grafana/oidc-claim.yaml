---
apiVersion: authelia.milas.dev/v1alpha2
kind: OIDCClient
metadata:
  name: grafana-oidc
  annotations:
    authelia.milas.dev/oidc-provider: kube-auth/default
spec:
  description: Grafana
  public: false
  authorization_policy: two_factor
  preconfigured_consent_duration: 1m

  scopes: [ 'openid', 'profile', 'groups', 'email', 'offline_access' ]
  redirect_uris: [ 'https://grafana.${DOMAIN_NAME}/login/generic_oauth' ]

  userinfo_signing_algorithm: none
  token_endpoint:
    auth_method: client_secret_basic

  secret_ref:
    name: grafana-oauth-secret
    fields:
      client_id: AUTH_CLIENT_ID
      client_secret: AUTH_CLIENT_SECRET
