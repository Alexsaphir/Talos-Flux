---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-metrics
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.62.1
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-metrics-operator
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: victoria-metrics

  values:
    fullnameOverride: victoria-metrics

    image:
      registry: quay.io

    crds:
      enabled: true
      upgrade:
        enabled: true
        forceConflicts: true

        busybox:
          image:
            repository: quay.io/quay/busybox

    operator:
      enable_converter_ownership: true

    serviceMonitor:
      enabled: true
      vm: false
