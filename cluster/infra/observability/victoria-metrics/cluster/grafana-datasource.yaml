---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: victoria-metrics
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana

  datasource:
    type: prometheus
    name: VictoriaMetrics
    access: proxy
    isDefault: true
    url: http://vmsingle-victoria-metrics-cluster.observability.svc.cluster.local:8428

---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: alertmanager
spec:
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana

  datasource:
    type: alertmanager
    name: AlertManager
    access: proxy
    jsonData:
      implementation: prometheus
    url: http://vmalertmanager-victoria-metrics-cluster.observability.svc.cluster.local:9093
