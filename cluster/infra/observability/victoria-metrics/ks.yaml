---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app victoria-metrics
  namespace: &namespace observability
spec:
  dependsOn:
    - name: prometheus-operator-crds
    - name: cert-manager
      namespace: cert-manager

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/infra/observability/victoria-metrics/operator
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-metrics-cluster
  namespace: observability
spec:
  dependsOn:
    - name: victoria-metrics
    - name: rook-ceph-cluster
      namespace: rook-ceph

  prune: true
  interval: 1h
  path: cluster/infra/observability/victoria-metrics/cluster
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
