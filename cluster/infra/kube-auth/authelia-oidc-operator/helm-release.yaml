---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: authelia-oidc-operator
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.0.1-28369932470-SNAPSHOT
  url: oci://ghcr.io/brunnels/charts/authelia-oidc-operator
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app authelia-oidc-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app

  dependsOn:
    - name: cert-manager
      namespace: cert-manager

  values:
    controllers:
      controller_manager:
        containers:
          manager:
            resources:
              limits:
                memory: 256Mi

    rawResources:
      provider:
        forceRename: default
        manifest:
          apiVersion: authelia.milas.dev/v1alpha1
          kind: OIDCProvider
          spec:
            cors:
              allowed_origins_from_client_redirect_uris: true
