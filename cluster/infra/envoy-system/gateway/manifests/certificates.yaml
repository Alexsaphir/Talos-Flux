---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-main
spec:
  dnsNames:
    - '${DOMAIN_NAME}'
    - '*.${DOMAIN_NAME}'
    - '*.talos.${DOMAIN_NAME}'

  issuerRef:
    name: letsencrypt
    kind: ClusterIssuer

  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always

  duration: 160h
  usages:
    - digital signature

  secretName: wildcard-main-tls
