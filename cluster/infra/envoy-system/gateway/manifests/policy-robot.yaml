---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: robots-txt
spec:
  parentRefs:
    - name: envoy
      namespace: envoy-system
      sectionName: https

  hostnames: [ '${DOMAIN_NAME}' ]

  rules:
    - matches: [ { path: { type: Exact, value: /robots.txt } } ]
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Cache-Control
                value: public, max-age=600
        - type: ExtensionRef
          extensionRef:
            group: gateway.envoyproxy.io
            kind: HTTPRouteFilter
            name: robots-txt-filter

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: HTTPRouteFilter
metadata:
  name: robots-txt-filter
spec:
  directResponse:
    contentType: text/plain
    statusCode: 200
    body:
      type: Inline
      inline: |
        User-agent: *
        Disallow: /

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: block-user-agent
  annotations:
    external-dns.alpha.kubernetes.io/controller: none
spec:
  parentRefs:
    - name: envoy
      namespace: envoy-system
      sectionName: https

  rules:
    - filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            remove: [ 'Server', 'X-Powered-By', 'X-AspNet-Version', 'X-AspNetMvc-Version' ]
            set:
              - name: Strict-Transport-Security
                value: max-age=31449600; includeSubDomains; preload

    - matches:
        - headers:
            - name: User-Agent
              type: RegularExpression
              value: '.*AddSearchBot.*|.*AI2Bot.*|.*AI2Bot-DeepResearchEval.*|.*Ai2Bot-Dolma.*|.*aiHitBot.*|.*amazon-kendra.*|.*Amazonbot.*|.*AmazonBuyForMe.*|.*Andibot.*|.*Anomura.*|.*anthropic-ai.*|.*Applebot.*|.*Applebot-Extended.*|.*atlassian-bot.*|.*Awario.*|.*bedrockbot.*|.*bigsur.ai.*|.*Bravebot.*|.*Brightbot 1.0.*|.*BuddyBot.*|.*Bytespider.*|.*CCBot.*|.*Channel3Bot.*|.*ChatGLM-Spider.*|.*ChatGPT Agent.*|.*ChatGPT-User.*|.*Claude-SearchBot.*|.*Claude-User.*|.*Claude-Web.*|.*ClaudeBot.*|.*Cloudflare-AutoRAG.*|.*CloudVertexBot.*|.*cohere-ai.*|.*cohere-training-data-crawler.*|.*Cotoyogi.*|.*Crawl4AI.*|.*Crawlspace.*|.*Datenbank Crawler.*|.*DeepSeekBot.*|.*Devin.*|.*Diffbot.*|.*DuckAssistBot.*|.*Echobot Bot.*|.*EchoboxBot.*|.*FacebookBot.*|.*facebookexternalhit.*|.*Factset_spyderbot.*|.*FirecrawlAgent.*|.*FriendlyCrawler.*|.*Gemini-Deep-Research.*|.*Google-CloudVertexBot.*|.*Google-Extended.*|.*Google-Firebase.*|.*Google-NotebookLM.*|.*GoogleAgent-Mariner.*|.*GoogleOther.*|.*GoogleOther-Image.*|.*GoogleOther-Video.*|.*GPTBot.*|.*iAskBot.*|.*iaskspider.*|.*iaskspider/2.0.*|.*IbouBot.*|.*ICC-Crawler.*|.*ImagesiftBot.*|.*imageSpider.*|.*img2dataset.*|.*ISSCyberRiskCrawler.*|.*Kangaroo Bot.*|.*KlaviyoAIBot.*|.*KunatoCrawler.*|.*laion-huggingface-processor.*|.*LAIONDownloader.*|.*LCC.*|.*LinerBot.*|.*Linguee Bot.*|.*LinkupBot.*|.*Manus-User.*|.*meta-externalagent.*|.*Meta-ExternalAgent.*|.*meta-externalfetcher.*|.*Meta-ExternalFetcher.*|.*meta-webindexer.*|.*MistralAI-User.*|.*MistralAI-User/1.0.*|.*MyCentralAIScraperBot.*|.*netEstate Imprint Crawler.*|.*NotebookLM.*|.*NovaAct.*|.*OAI-SearchBot.*|.*omgili.*|.*omgilibot.*|.*OpenAI.*|.*Operator.*|.*PanguBot.*|.*Panscient.*|.*panscient.com.*|.*Perplexity-User.*|.*PerplexityBot.*|.*PetalBot.*|.*PhindBot.*|.*Poggio-Citations.*|.*Poseidon Research Crawler.*|.*QualifiedBot.*|.*QuillBot.*|.*quillbot.com.*|.*SBIntuitionsBot.*|.*Scrapy.*|.*SemrushBot-OCOB.*|.*SemrushBot-SWA.*|.*ShapBot.*|.*Sidetrade indexer bot.*|.*Spider.*|.*TerraCotta.*|.*Thinkbot.*|.*TikTokSpider.*|.*Timpibot.*|.*TwinAgent.*|.*VelenPublicWebCrawler.*|.*WARDBot.*|.*Webzio-Extended.*|.*webzio-extended.*|.*wpbot.*|.*WRTNBot.*|.*YaK.*|.*YandexAdditional.*|.*YandexAdditionalBot.*|.*YouBot.*|.*ZanistaBot.*|.*FediBigData.*'
                # how to get the above from Neovim:
                # curl -vL 'https://raw.githubusercontent.com/ai-robots-txt/ai.robots.txt/refs/heads/main/robots.txt' | nvim
                # first half:
                # :%s/\nUser-agent:/,/g
                # second half:
              # :%s/, /*, \~*/g

      filters:
        - type: RequestRedirect
          requestRedirect:
            statusCode: 301
            hostname: www.google.com
            port: 443
            path:
              type: ReplaceFullPath
              replaceFullPath: '/'

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: block-user-agents
spec:
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway

  lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          local ua = request_handle:headers():get("user-agent") or ""
          local blocked = { "AddSearchBot", "AI2Bot", "AI2Bot%-DeepResearchEval", "Ai2Bot%-Dolma", "aiHitBot", "amazon%-kendra", "Amazonbot", "AmazonBuyForMe", "Andibot", "Anomura", "anthropic%-ai", "Applebot", "Applebot%-Extended", "atlassian%-bot", "Awario", "bedrockbot", "bigsur%.ai", "Bravebot", "Brightbot 1%.0", "BuddyBot", "Bytespider", "CCBot", "Channel3Bot", "ChatGLM%-Spider", "ChatGPT Agent", "ChatGPT%-User", "Claude%-SearchBot", "Claude%-User", "Claude%-Web", "ClaudeBot", "Cloudflare%-AutoRAG", "CloudVertexBot", "cohere%-ai", "cohere%-training%-data%-crawler", "Cotoyogi", "Crawl4AI", "Crawlspace", "Datenbank Crawler", "DeepSeekBot", "Devin", "Diffbot", "DuckAssistBot", "Echobot Bot", "EchoboxBot", "FacebookBot", "facebookexternalhit", "Factset_spyderbot", "FirecrawlAgent", "FriendlyCrawler", "Gemini%-Deep%-Research", "Google%-CloudVertexBot", "Google%-Extended", "Google%-Firebase", "Google%-NotebookLM", "GoogleAgent%-Mariner", "GoogleOther", "GoogleOther%-Image", "GoogleOther%-Video", "GPTBot", "iAskBot", "iaskspider", "iaskspider/2%.0", "IbouBot", "ICC%-Crawler", "ImagesiftBot", "imageSpider", "img2dataset", "ISSCyberRiskCrawler", "Kangaroo Bot", "KlaviyoAIBot", "KunatoCrawler", "laion%-huggingface%-processor", "LAIONDownloader", "LCC", "LinerBot", "Linguee Bot", "LinkupBot", "Manus%-User", "meta%-externalagent", "Meta%-ExternalAgent", "meta%-externalfetcher", "Meta%-ExternalFetcher", "meta%-webindexer", "MistralAI%-User", "MistralAI%-User/1%.0", "MyCentralAIScraperBot", "netEstate Imprint Crawler", "NotebookLM", "NovaAct", "OAI%-SearchBot", "omgili", "omgilibot", "OpenAI", "Operator", "PanguBot", "Panscient", "panscient%.com", "Perplexity%-User", "PerplexityBot", "PetalBot", "PhindBot", "Poggio%-Citations", "Poseidon Research Crawler", "QualifiedBot", "QuillBot", "quillbot%.com", "SBIntuitionsBot", "Scrapy", "SemrushBot%-OCOB", "SemrushBot%-SWA", "ShapBot", "Sidetrade indexer bot", "Spider", "TerraCotta", "Thinkbot", "TikTokSpider", "Timpibot", "TwinAgent", "VelenPublicWebCrawler", "WARDBot", "Webzio%-Extended", "webzio%-extended", "wpbot", "WRTNBot", "YaK", "YandexAdditional", "YandexAdditionalBot", "YouBot", "ZanistaBot", "FediBigData" }
          for _, s in ipairs(blocked) do
            if string.match(string.lower(ua), string.lower(s)) then
              request_handle:respond({[":status"] = "403"}, "Forbidden")
              return
            end
          end
        end
