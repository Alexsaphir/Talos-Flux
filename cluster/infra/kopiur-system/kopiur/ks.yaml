---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kopiur
  namespace: &namespace kopiur-system
spec:
  dependsOn:
    - name: snapshot-controller
      namespace: kube-system

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/infra/kopiur-system/kopiur
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
