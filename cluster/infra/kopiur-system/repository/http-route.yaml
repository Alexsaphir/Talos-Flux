---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kopiur-nas

spec:
  # noinspection KubernetesUnknownValues
  hostnames:
    - kopiur.${DOMAIN_NAME}

  parentRefs:
    - name: envoy
      namespace: envoy-system

  rules:
    - backendRefs:
        - name: nas-kopia-ui
          port: 51515
