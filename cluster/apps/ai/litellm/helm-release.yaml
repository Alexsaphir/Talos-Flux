---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: litellm
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 5.0.1
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app litellm
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    controllers:
      litellm:
        annotations:
          reloader.stakater.com/auto: 'true'

        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: v1.83.14-stable@sha256:d6401c001f90f3bab4bb23c5fd6d9302a7df58999ec6fa9e3f175e1f5f26544b
            args:
              - --config=/app/config.yaml

            envFrom:
              - secretRef:
                  name: '{{ .Release.Name }}-secret'

            env:
              LITELLM_LOG: INFO
              LITELLM_MODE: PRODUCTION

              REDIS_HOST: dragonfly.database.svc.cluster.local
              REDIS_PORT: '6379'

            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi

    service:
      app:
        ports:
          http:
            port: 4000

    route:
      app:
        hostnames: [ 'litellm.${DOMAIN_NAME}' ]
        parentRefs:
          - name: envoy
            namespace: envoy-system
        rules:
          - backendRefs:
              - identifier: app
                port: http

    persistence:
      cache:
        type: emptyDir
        advancedMounts:
          litellm:
            app:
              - path: /app/cache

      config:
        type: configMap
        name: litellm-configmap
        globalMounts:
          - path: /app/config.yaml
            subPath: config.yaml
            readOnly: true
