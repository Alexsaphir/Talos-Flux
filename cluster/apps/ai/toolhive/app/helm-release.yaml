---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: toolhive-operator
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.34.0
  url: oci://ghcr.io/stacklok/toolhive/toolhive-operator
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app toolhive-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    operator:
      replicaCount: 1

      resources:
        requests:
          cpu: 10m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

      gc:
        gomemlimit: 230MiB
        gogc: 75
