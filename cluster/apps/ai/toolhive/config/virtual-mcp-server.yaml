---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: VirtualMCPServer
metadata:
  name: mcp-gateway-internal
spec:
  groupRef:
    name: mcp-tools

  telemetryConfigRef:
    name: prometheus

  config:
    aggregation:
      conflictResolution: prefix
      conflictResolutionConfig:
        prefixFormat: '{workload}_'

  incomingAuth:
    type: anonymous

  outgoingAuth:
    source: discovered

  sessionStorage:
    provider: redis
    address: dragonfly.database.svc.cluster.local:6379
    keyPrefix: 'mcp-gateway-internal:'

  podTemplateSpec:
    spec:
      containers:
        - name: vmcp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1536Mi
