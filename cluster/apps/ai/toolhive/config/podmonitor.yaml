---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: mcp-gateway-internal
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: virtualmcpserver
      app.kubernetes.io/instance: mcp-gateway-internal

  namespaceSelector:
    matchNames:
      - ai

  podMetricsEndpoints:
    - port: http
      path: /metrics
      interval: 15s
