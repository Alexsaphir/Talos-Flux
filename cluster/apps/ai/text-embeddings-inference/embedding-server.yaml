---
apiVersion: toolhive.stacklok.dev/v1alpha1
kind: EmbeddingServer
metadata:
  name: embedding
spec:
  model: sentence-transformers/all-MiniLM-L6-v2
  image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest@sha256:7f8cbd5fbf27d1ad82450b68ec37e542bbfb0d03e6dc79d6d00242022f2fc4c7
  env:
    - name: HOSTNAME
      value: '::'

  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 1Gi
