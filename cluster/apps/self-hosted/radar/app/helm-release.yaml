---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: radar
spec:
  interval: 1h
  url: https://skyhook-io.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app radar
spec:
  interval: 1h

  chart:
    spec:
      chart: radar
      version: 1.8.3
      sourceRef:
        kind: HelmRepository
        name: radar

  values:
    fullnameOverride: *app

    mcp:
      enabled: false

    traffic:
      prometheusUrl: http://vmsingle-victoria-metrics.observability.svc.cluster.local:8428
