---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: planka-prod
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden

  target:
    name: planka-prod-secret
    template:
      data:
        SECRET_KEY: '{{ .PLANKA_PROD_SECRET_KEY }}'

        OIDC_CLIENT_ID: '{{ .PLANKA_PROD_OIDC_CLIENT_ID }}'
        OIDC_CLIENT_SECRET: '{{ .PLANKA_PROD_OIDC_CLIENT_SECRET }}'
        OIDC_ISSUER: '{{ .PLANKA_PROD_OIDC_ISSUER }}'

        S3_ACCESS_KEY_ID: '{{ .PLANKA_PROD_S3_ACCESS_KEY_ID }}'
        S3_SECRET_ACCESS_KEY: '{{ .PLANKA_PROD_S3_SECRET_ACCESS_KEY }}'

  dataFrom:
    - extract:
        key: planka-prod
