---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: planka
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden

  target:
    name: planka-secret
    template:
      data:
        SECRET_KEY: '{{ .PLANKA_SECRET_KEY }}'

        S3_ACCESS_KEY_ID: '{{ .PLANKA_S3_ACCESS_KEY_ID }}'
        S3_SECRET_ACCESS_KEY: '{{ .PLANKA_S3_SECRET_ACCESS_KEY }}'

  dataFrom:
    - extract:
        key: planka-home

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: planka-oidc
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden

  target:
    name: planka-oidc-secret
    template:
      metadata:
        annotations:
          reflector.v1.k8s.emberstack.com/reflection-allowed: 'true'
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: 'true'
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: 'kube-auth'

      data:
        OIDC_CLIENT_ID: '{{ .PLANKA_OIDC_CLIENT_ID }}'
        OIDC_CLIENT_SECRET: '{{ .PLANKA_OIDC_CLIENT_SECRET }}'

  dataFrom:
    - extract:
        key: planka-home
