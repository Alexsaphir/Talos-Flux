---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kguardian
  namespace: kguardian
spec:

  postBuild:
    substitute:
      APP: *app

  prune: true
  interval: 1h
  path: cluster/apps/self-hosted/kguardian/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
