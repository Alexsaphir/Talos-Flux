---
apiVersion: authelia.milas.dev/v1alpha2
kind: OIDCClient
metadata:
  name: immich-oidc
  annotations:
    authelia.milas.dev/oidc-provider: kube-auth/default
spec:
  description: Immich
  public: false
  authorization_policy: two_factor
  preconfigured_consent_duration: 1m

  scopes: [ 'openid', 'profile', 'email' ]
  redirect_uris:
    - 'https://photos.${DOMAIN_NAME}/auth/login'
    - 'https://photos.${DOMAIN_NAME}/user-settings'
    - 'app.immich:///oauth-callback'

  userinfo_signing_algorithm: none
  token_endpoint:
    auth_method: client_secret_post

  secret_ref:
    name: immich-oauth-secret
    fields:
      client_id: IMMICH_OAUTH_CLIENT_ID
      client_secret: IMMICH_OAUTH_CLIENT_SECRET
