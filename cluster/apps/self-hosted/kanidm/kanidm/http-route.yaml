---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kanidm

spec:
  # noinspection KubernetesUnknownValues
  hostnames:
    - sso.${DOMAIN_NAME}

  parentRefs:
    - name: envoy
      namespace: envoy-system

  rules:
    - backendRefs:
        - name: sso
          port: 8443
