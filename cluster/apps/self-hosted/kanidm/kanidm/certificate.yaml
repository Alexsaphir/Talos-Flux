---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: &name sso-tls
spec:
  secretName: *name

  dnsNames:
    - sso.${DOMAIN_NAME}
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt

  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - digital signature
    - key encipherment
