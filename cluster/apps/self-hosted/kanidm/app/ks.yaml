---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kaniop
  namespace: &namespace kanidm

spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/apps/self-hosted/kanidm/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
