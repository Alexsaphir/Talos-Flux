---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app gotosocial
  namespace: &namespace fediverse
spec:
  components:
    - ../../../components/volsync

  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph

  postBuild:
    substitute:
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 10Gi

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/apps/fediverse/gotosocial
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
