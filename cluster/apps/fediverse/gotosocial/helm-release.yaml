---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: gotosocial
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 5.0.0
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app gotosocial
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    defaultPodOptions:
      annotations:
        logging.vlagent.io/exclude-main: 'true'

    controllers:
      *app :
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        containers:
          main:
            image:
              repository: docker.io/superseriousbusiness/gotosocial
              tag: 0.21.2@sha256:53106462f352c23c25a32d4bd5c03eb3c2198f2d2549ff1e7d5ef6deb7f44961

            envFrom:
              - secretRef:
                  name: '{{ .Release.Name }}-secret'

            env:
              TZ: ${TIMEZONE}

              GTS_HOST: &hostname 'gts.${DOMAIN_NAME}'
              GTS_ACCOUNT_DOMAIN: &domainname ${DOMAIN_NAME}
              GTS_SEMAPHORE_URL: https://phanpy.${DOMAIN_NAME}

              GTS_LANDING_PAGE_USER: 'Alexsaphir'

              GTS_STORAGE_LOCAL_BASE_PATH: /storage
              GTS_METRICS_ENABLED: 'true'
              GTS_BIND_ADDRESS: '::'
              GTS_TRUSTED_PROXIES: '127.0.0.1/32,::1,10.42.0.0/16,fdd5:aa8:9535:42::/108'
              # GTS_ADVANCED_RATE_LIMIT_EXCEPTIONS: '192.168.1.0/24'
              GTS_ACCOUNTS_ALLOW_CUSTOM_CSS: 'true'

              GTS_OIDC_ENABLED: 'true'
              GTS_OIDC_IDP_NAME: 'Authelia'
              GTS_OIDC_ISSUER: 'https://auth.${DOMAIN_NAME}'
              GTS_OIDC_SCOPES: 'openid,email,profile,groups'
              #              GTS_OIDC_LINK_EXISTING: 'true'
              GTS_OIDC_ADMIN_GROUPS: 'cluster-admins'

              GTS_DB_TYPE: postgres
              GTS_DB_POSTGRES_CONNECTION_STRING:
                valueFrom:
                  secretKeyRef:
                    name: 'database-{{ .Release.Name }}'
                    key: POSTGRES_URL

            resources:
              requests:
                cpu: 10m
            #              limits:
            #                memory: 512Mi

            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: [ ALL ] }

    persistence:
      storage:
        existingClaim: *app
        globalMounts:
          - subPath: data
            path: /storage
      tmpfs:
        type: emptyDir
        sizeLimit: 1Gi
        globalMounts:
          - path: /tmp
            subPath: tmp

    service:
      app:
        ports:
          http:
            port: 80
            targetPort: 8080
          metrics:
            port: 9464

    route:
      app:
        hostnames: [ *hostname ]
        parentRefs:
          - name: envoy
            namespace: envoy-system
        rules:
          - backendRefs:
              - identifier: app
                port: 80
            filters:
              - cors:
                  allowHeaders:
                    - '*'
                  allowMethods:
                    - '*'
                  allowOrigins:
                    - '*'
                  maxAge: 86400
                type: CORS
      well-known:
        hostnames: [ *domainname ]
        parentRefs:
          - name: envoy
            namespace: envoy-system
        rules:
          - backendRefs:
              - identifier: app
                port: 80
            matches:
              - path:
                  type: Exact
                  value: /.well-known/webfinger
              - path:
                  type: Exact
                  value: /.well-known/nodeinfo
              - path:
                  type: Exact
                  value: /.well-known/host-meta

    serviceMonitor:
      app:
        endpoints:
          - port: metrics
            interval: 30s
            path: /metrics
