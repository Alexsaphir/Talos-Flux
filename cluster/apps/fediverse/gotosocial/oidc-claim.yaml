---
apiVersion: authelia.milas.dev/v1alpha2
kind: OIDCClient
metadata:
  name: gotosocial-oidc
  annotations:
    authelia.milas.dev/oidc-provider: kube-auth/default
spec:
  description: GTS

  public: false
  authorization_policy: two_factor
  preconfigured_consent_duration: 1m

  scopes: [ 'openid', 'profile', 'groups', 'email' ]
  redirect_uris: [ 'https://gts.${DOMAIN_NAME}/auth/callback' ]

  userinfo_signing_algorithm: none
  response_types: [ code ]
  grant_types: [ authorization_code ]

  token_endpoint:
    auth_method: client_secret_basic

  secret_ref:
    name: gotosocial-secret
    fields:
      client_id: GTS_OIDC_CLIENT_ID
      client_secret: GTS_OIDC_CLIENT_SECRET
