---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app phanpy
spec:
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app

  prune: true
  interval: 1h
  path: cluster/apps/fediverse/phanpy
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
