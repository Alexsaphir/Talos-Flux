---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: phanpy
spec:
  interval: 1h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 5.0.1
  url: oci://ghcr.io/bjw-s-labs/helm/app-template
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app phanpy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    controllers:
      *app :
        containers:
          main:
            image:
              repository: ghcr.io/jjgadgets/phanpy
              tag: 2026.06.23.05dcc55@sha256:178a857ba5f3d12664e5bee15a617958b8799d81dbda36662276362268c5e42f

            env:
              PHANPY_WEBSITE: &hostname '{{ .Release.Name }}.${DOMAIN_NAME}'
              PHANPY_DEFAULT_INSTANCE: '${DOMAIN_NAME}'

            resources:
              requests:
                cpu: 10m
              # limits:
              #   memory: 512Mi

    service:
      main:
        controller: phanpy
        ports:
          http:
            port: 80
            targetPort: 8080

    route:
      app:
        hostnames: [ *hostname ]
        parentRefs:
          - name: envoy
            namespace: envoy-system
