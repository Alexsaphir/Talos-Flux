---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: codecov-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden

  target:
    name: codecov-config-secret
    template:
      data:
        SETUP__ENTERPRISE_LICENSE: '{{ .codecov_enterprise_license }}'
        SETUP__HTTP__COOKIE_SECRET: '{{ .codecov_cookie_secret }}'

        GITLAB_ENTERPRISE__CLIENT_ID: '{{ .codecov_gitlab_client_id }}'
        GITLAB_ENTERPRISE__CLIENT_SECRET: '{{ .codecov_gitlab_client_secret }}'
        GITLAB_ENTERPRISE__BOT__KEY: '{{ .codecov_gitlab_pat_token }}'

        SERVICES__MINIO__ACCESS_KEY_ID: '{{ .codecov_s3_access_key }}'
        SERVICES__MINIO__SECRET_ACCESS_KEY: '{{ .codecov_s3_secret_key }}'


  dataFrom:
    - extract:
        key: codecov

    - extract:
        key: gitlab-codecov
