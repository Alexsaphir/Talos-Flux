---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app traffic-manager
  namespace: &namespace telepresence
spec:
  postBuild:
    substitute:
      APP: *app

  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace

  prune: true
  interval: 1h
  path: cluster/apps/dev/telepresence/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
