---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app forgejo
  namespace: forgejo
spec:
  components:
    - ../../../../components/volsync

  postBuild:
    substitute:
      APP: *app
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 20Gi
      VOLSYNC_CACHE_CAPACITY: 20Gi

  prune: true
  interval: 1h
  path: cluster/apps/dev/forgejo/app
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
