---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app prowlarr
  namespace: media
spec:
  components:
    - ../../../../components/zero-scaler
    - ../../../../components/volsync
    - ../../../../components/kopiur

  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph

  postBuild:
    substitute:
      APP: *app
      PVC_NAME: *app
      VOLSYNC_CAPACITY: 5Gi

  prune: true
  interval: 1h
  path: cluster/apps/media/arr/prowlarr
  sourceRef:
    kind: GitRepository
    name: talos-kubernetes
    namespace: flux-system
