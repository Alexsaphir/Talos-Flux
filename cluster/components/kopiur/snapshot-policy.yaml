---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: SnapshotPolicy
metadata:
  name: ${PVC_NAME}
  annotations:
    kopiur.home-operations.com/allow-identity-change: 'true'
spec:
  repository:
    kind: ClusterRepository
    name: nas

  retention:
    keepDaily: 7
    keepHourly: 24

  sources:
    - pvc:
        name: ${PVC_NAME}

  verification:
    deep:
      schedule:
        cron: H 5 1 * *
    quick:
      schedule:
        cron: H 3 * * *

  volumeSnapshotClassName: ${KOPIUR_SNAPSHOTCLASS:=csi-ceph-blockpool}
